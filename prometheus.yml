global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prestige-hostel-local'
    metrics_path: /prestige-hostel/v1/metrics
    static_configs:
      - targets: ['host-gateway:5900'] #PM2 instance
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: localhost:5900  # Match what the dashboard expects

    